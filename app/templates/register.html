{% extends "base.html" %}
{% block content %}
<div class="form-card">
  <h2><i class="fa-solid fa-user-plus"></i> Регистрация</h2>
  <form id="reg-form">
    <label>Email<input name="email" type="email" required></label>
    <label>Логин<input name="username" required pattern="[A-Za-z0-9_]{3,50}"></label>
    <label>Пароль<input name="password" type="password" required minlength="6"></label>
    <button class="btn primary" type="submit"><i class="fa-solid fa-user-check"></i> Создать аккаунт</button>
    <p class="error" id="reg-error"></p>
  </form>
  <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>
<script>
document.getElementById('reg-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = Object.fromEntries(fd.entries());
  const r = await fetch('/api/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    document.getElementById('reg-error').textContent = err.detail || 'Ошибка регистрации';
    return;
  }
  // auto-login
  const body = new URLSearchParams();
  body.append('username', payload.username);
  body.append('password', payload.password);
  const lr = await fetch('/api/auth/login', { method: 'POST', body });
  const data = await lr.json();
  localStorage.setItem('token', data.access_token);
  location.href = '/profile';
});
</script>
{% endblock %}
