<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ReshuLyceum{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="/static/css/style.css">
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.dataset.theme = t;
    })();
  </script>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/"><i class="fa-solid fa-bolt"></i> ReshuLyceum</a>
    <div class="nav-links">
      <a href="/tasks"><i class="fa-solid fa-list-check"></i> Задачи</a>
      <a href="/leaderboard"><i class="fa-solid fa-ranking-star"></i> Рейтинг</a>
      <a href="/profile" id="nav-profile"><i class="fa-solid fa-user"></i> Профиль</a>
      <a href="/admin" id="nav-admin" style="display:none"><i class="fa-solid fa-shield-halved"></i> Админ</a>
      <a href="/login" id="nav-login"><i class="fa-solid fa-right-to-bracket"></i> Войти</a>
      <a href="/register" id="nav-register"><i class="fa-solid fa-user-plus"></i> Регистрация</a>
      <a href="#" id="nav-logout" style="display:none"><i class="fa-solid fa-right-from-bracket"></i> Выйти</a>
      <button id="theme-toggle" class="theme-btn" title="Переключить тему">тема</button>
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">ReshuLyceum · <a href="/docs"><i class="fa-solid fa-code"></i> API Docs</a></footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
