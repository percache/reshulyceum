<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ReshuLyceum — тренажёр по информатике{% endblock %}</title>
  <meta name="description" content="Платформа подготовки к ЕГЭ по информатике: адаптивная сложность, XP, достижения, рейтинг.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%23ffcc00'/%3E%3Cstop offset='1' stop-color='%23ff5e57'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath d='M22 14h12l-10 18h12l-18 22 4-18H10z' fill='%23111'/%3E%3C/svg%3E">
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.dataset.theme = t;
    })();
  </script>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/"><i class="fa-solid fa-bolt"></i> ReshuLyceum</a>
    <div class="nav-links">
      <a href="/tasks" data-nav="/tasks"><i class="fa-solid fa-list-check"></i> Задачи</a>
      <a href="/leaderboard" data-nav="/leaderboard"><i class="fa-solid fa-ranking-star"></i> Рейтинг</a>
      <a href="/profile" data-nav="/profile" id="nav-profile"><i class="fa-solid fa-user"></i> Профиль</a>
      <a href="/admin" data-nav="/admin" id="nav-admin" style="display:none"><i class="fa-solid fa-shield-halved"></i> Админ</a>
      <a href="/login" data-nav="/login" id="nav-login"><i class="fa-solid fa-right-to-bracket"></i> Войти</a>
      <a href="/register" data-nav="/register" id="nav-register"><i class="fa-solid fa-user-plus"></i> Регистрация</a>
      <a href="#" id="nav-logout" style="display:none"><i class="fa-solid fa-right-from-bracket"></i> Выйти</a>
      <button id="theme-toggle" class="theme-btn" title="Переключить тему"><i class="fa-solid fa-moon"></i></button>
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    ReshuLyceum · <a href="/docs"><i class="fa-solid fa-code"></i> API Docs</a>
    · <a href="/api/health"><i class="fa-solid fa-heart-pulse"></i> Health</a>

  </footer>
  <div id="toast-host"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
